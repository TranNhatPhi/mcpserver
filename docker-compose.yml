services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - mcp
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Chạy thủ công lần đầu: docker compose run --rm certbot certonly ...
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_USER:-admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_PASSWORD:-password123}"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  mcp:
    build: .
    expose:
      - "8000"
    environment:
      MCP_BASE_DIR: /kb/brainLNC
      MCP_READ_ONLY: "${MCP_READ_ONLY:-1}"
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      MCP_THREAD_LIMIT: "120"
      PYTHONUNBUFFERED: "1"
      MCP_PUBLIC_URL: "${MCP_PUBLIC_URL:-}"
      MCP_DRIVE_ENABLED: "${MCP_DRIVE_ENABLED:-0}"
      MCP_S3_ENABLED: "${MCP_S3_ENABLED:-1}"
      MCP_S3_ENDPOINT: "http://minio:9000"
      MCP_S3_ACCESS_KEY: "${MINIO_USER:-admin}"
      MCP_S3_SECRET_KEY: "${MINIO_PASSWORD:-password123}"
      MCP_S3_BUCKET: "${MCP_S3_BUCKET:-brainlnc}"
      MCP_S3_REGION: "us-east-1"
    volumes:
      - "${KB_PATH:-./data}:/kb:ro"
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('127.0.0.1',8000),3); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  minio_data:
  certbot_certs:
  certbot_www:
